<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>Feira</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --green-mid: #52b788;
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --text-muted: #71717a;
      --checked-bg: #f0f0f0;
      --checked-text: #aaaaaa;
      --header-h: 72px;
      --search-h: 52px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-left .counter {
      font-size: 12px;
      opacity: .85;
      margin-top: 1px;
    }

    .header-right {
      text-align: right;
    }

    .header-right .total-label {
      font-size: 11px;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .header-right .total-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* ── SEARCH BAR ── */
    #search-bar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      height: var(--search-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      z-index: 99;
    }

    #search-bar .search-icon {
      color: var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    #search-input {
      flex: 1;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }

    #search-input::placeholder { color: var(--text-muted); }

    #search-clear {
      display: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: #e4e4e7;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #search-clear.visible { display: flex; }

    /* ── MAIN CONTENT ── */
    main {
      padding-top: calc(var(--header-h) + var(--search-h));
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
    }

    /* ── CATEGORY ── */
    .category {
      margin: 12px 12px 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--cat-color, var(--green));
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .category-header:active { filter: brightness(.93); }

    .category-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }

    .category-badge {
      background: rgba(255,255,255,.25);
      color: #fff;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      margin-right: 10px;
    }

    .category-chevron {
      color: #fff;
      font-size: 18px;
      transition: transform .2s;
      display: inline-block;
    }

    .category.collapsed .category-chevron { transform: rotate(-90deg); }

    .category-body {
      background: var(--card);
    }

    .category.collapsed .category-body { display: none; }

    /* ── PRODUCT ITEM ── */
    .item {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 80px 90px;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      transition: background .2s, opacity .2s;
      min-height: 56px;
    }

    .item:last-child { border-bottom: none; }

    .item.checked {
      background: var(--checked-bg);
    }

    /* ── SWIPE DELETE ── */
    .item-content {
      display: contents;
    }

    .item-delete-bg {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 80px;
      background: #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
    }

    .item-delete-bg.visible { opacity: 1; }

    .item-inner {
      display: contents;
    }

    .item-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      min-width: 0;
    }

    .item.checked .item-name {
      color: var(--checked-text);
      text-decoration: line-through;
    }

    .check-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--cat-color, var(--green));
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .check-icon svg { width: 13px; height: 13px; }

    .item.checked .check-icon { display: flex; }

    .name-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── INPUTS ── */
    .item input[type="text"] {
      width: 100%;
      height: 44px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }

    .item input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(82,183,136,.18);
    }

    .item.checked input {
      background: #e8e8e8;
      color: #aaa;
      border-color: #ddd;
    }

    .input-wrap { position: relative; }

    .input-label {
      position: absolute;
      top: -9px;
      left: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      background: #fff;
      padding: 0 3px;
      line-height: 1;
      pointer-events: none;
    }

    .item.checked .input-label { background: var(--checked-bg); }

    /* ── CONFIRM MODAL ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .confirm-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-box {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px 20px;
      width: 100%;
      max-width: 320px;
      transform: scale(.9);
      transition: transform .2s;
    }

    .confirm-overlay.open .confirm-box { transform: scale(1); }

    .confirm-box h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confirm-box p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
    }

    .confirm-actions button {
      flex: 1;
      height: 46px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancel { background: #f4f4f5; color: var(--text); }
    .btn-confirm { background: #ef4444; color: #fff; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: .3; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .btn-add-from-search {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn-add-from-search:active { filter: brightness(.88); transform: scale(.96); }

    /* ── CLEAR BTN (bottom of list) ── */
    .btn-clear-bottom {
      display: block;
      width: 100%;
      padding: 20px 16px 28px;
      text-align: center;
      background: transparent;
      border: none;
      font-size: 14px;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-clear-bottom:active { opacity: .6; }

    /* ── ITEM SLIDE-OUT ANIMATION ── */
    @keyframes slideOutFade {
      to { transform: translateX(-100%); opacity: 0; max-height: 0; padding: 0; margin: 0; }
    }

    .item.deleting {
      animation: slideOutFade .25s ease forwards;
      overflow: hidden;
    }

    @media (min-width: 480px) {
      .category { margin: 12px 16px 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Feira</h1>
    <div class="counter" id="counter">0 de 0 itens pegos</div>
  </div>
  <div class="header-right">
    <div class="total-label">Total</div>
    <div class="total-value" id="total">R$ 0,00</div>
  </div>
</header>

<!-- Barra de busca fixa -->
<div id="search-bar">
  <span class="search-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </span>
  <input type="text" id="search-input" placeholder="Buscar ou adicionar produto..." autocomplete="off" autocorrect="off" autocapitalize="words" />
  <button id="search-clear" aria-label="Limpar busca">×</button>
</div>

<main id="list-root"></main>

<!-- Modal confirmar limpeza -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Limpar valores?</h3>
    <p>Os campos de quantidade e preço serão apagados. Os produtos permanecem na lista.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="btn-cancel-clear">Cancelar</button>
      <button class="btn-confirm" id="btn-confirm-clear">Limpar</button>
    </div>
  </div>
</div>

<!-- Modal confirmar exclusão de produto -->
<div class="confirm-overlay" id="delete-confirm-overlay">
  <div class="confirm-box">
    <h3>Excluir produto?</h3>
    <p id="delete-confirm-text">O produto será removido da lista.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="btn-cancel-delete">Cancelar</button>
      <button class="btn-confirm" id="btn-confirm-delete">Excluir</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ─── CATEGORY COLOR PALETTE ─────────────────────────────────────
  const CAT_COLORS = [
    '#2d6a4f', // verde escuro
    '#1d6fa4', // azul
    '#7b4fa4', // roxo
    '#c05621', // laranja escuro
    '#a4752d', // dourado
    '#c0392b', // vermelho
    '#1a7a6e', // teal
    '#5c3a8a', // violeta
    '#2e7d8a', // azul petróleo
    '#7a4a2d', // marrom
    '#4a7a2d'  // verde oliva
  ];

  // Fixed colors for new named categories
  const NAMED_CAT_COLORS = {
    'Hortifruti': '#4a7c59',
    'Congelados': '#2980b9',
    'Snacks e petiscos': '#c0392b',
    'Bebidas': '#8e44ad',
    'Cereais e café da manhã': '#d35400',
    'Sem categoria': '#888888'
  };

  function getCatColor(index, catName) {
    if (NAMED_CAT_COLORS[catName]) return NAMED_CAT_COLORS[catName];
    return CAT_COLORS[index % CAT_COLORS.length];
  }

  // ─── DEFAULT DATA ───────────────────────────────────────────────
  const DEFAULT_CATEGORIES = [
    {
      id: 'limpeza',
      name: 'Limpeza da casa',
      items: ['Sabão em pó','Amaciante','Água sanitária','Detergente','Desinfetante','Percarbonato de sódio','Gel sanitário para vaso','Aromatizador de ambientes','Bombril','Veja multiuso','Álcool']
    },
    {
      id: 'papeis',
      name: 'Papéis, descartáveis e utilidades',
      items: ['Papel toalha','Papel higiênico','Saco plástico']
    },
    {
      id: 'higiene',
      name: 'Higiene pessoal',
      items: ['Escova de dente','Gilete','Prestobarba','Sabonete','Shampoo','Condicionador','Desodorante spray','Desodorante aerosol','Desodorante Herbíssimo','Cotonete','Absorvente','Lenço umedecido']
    },
    {
      id: 'cafe',
      name: 'Café da manhã e bebidas',
      items: ['Café','Leite em pó','Leite','Toddy']
    },
    {
      id: 'cereais',
      name: 'Cereais e café da manhã',
      items: ['Granola','Aveia em flocos','Mel','Geleia','Tapioca','Cuscuz']
    },
    {
      id: 'biscoitos',
      name: 'Biscoitos e bolachas',
      items: ['Bolacha maizena','Bolacha cream cracker','Bolacha de coco','Bolacha de leite']
    },
    {
      id: 'mercearia',
      name: 'Mercearia básica',
      items: ['Macarrão','Açúcar','Feijão','Miojo']
    },
    {
      id: 'temperos',
      name: 'Temperos, molhos e condimentos',
      items: ['Ajinomoto','Sal de parrilla','Azeite','Molho de tomate','Maionese','Azeitona']
    },
    {
      id: 'enlatados',
      name: 'Enlatados e milho',
      items: ['Milho','Milho de pipoca']
    },
    {
      id: 'frios',
      name: 'Frios e refrigerados',
      items: ['Bacon','Calabresa','Presunto','Queijo','Iogurte','Margarina','Requeijão']
    },
    {
      id: 'padaria',
      name: 'Padaria',
      items: ['Pão de forma']
    },
    {
      id: 'acougue',
      name: 'Açougue e carnes',
      items: ['Coração de galinha','Filé de peito','Coxinha da asa']
    },
    {
      id: 'hortifruti',
      name: 'Hortifruti',
      items: ['Alface','Tomate','Cenoura','Batata','Cebola','Alho','Banana','Maçã','Laranja','Limão']
    },
    {
      id: 'congelados',
      name: 'Congelados',
      items: ['Pizza congelada','Sorvete','Nuggets','Batata frita congelada']
    },
    {
      id: 'snacks',
      name: 'Snacks e petiscos',
      items: ['Salgadinho','Chocolate','Amendoim','Pipoca de micro-ondas']
    },
    {
      id: 'bebidas',
      name: 'Bebidas',
      items: ['Água mineral','Refrigerante','Suco de caixinha','Cerveja']
    }
  ];

  // ─── STATE ──────────────────────────────────────────────────────
  let state = {
    categories: [],
    products: [],
    nextId: 1
  };

  function loadState() {
    try {
      const saved = localStorage.getItem('feira_state');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.categories && parsed.products) {
          state = parsed;
          // Migrate old price format
          state.products.forEach(p => {
            if (p.price !== '' && p.price !== null && p.price !== undefined) {
              const v = p.price;
              if (typeof v === 'string' && v !== '') {
                const clean = v.replace(',', '.');
                const num = parseFloat(clean);
                if (!isNaN(num)) {
                  p.price = Math.round(num * 100);
                } else {
                  p.price = '';
                }
              }
            }
          });
          // Ensure new categories exist in saved state
          ensureNewCategories();
          return;
        }
      }
    } catch (e) { /* ignore */ }
    // init from defaults
    state.categories = DEFAULT_CATEGORIES.map(c => ({ id: c.id, name: c.name, collapsed: false }));
    state.products = [];
    let pid = 1;
    DEFAULT_CATEGORIES.forEach(c => {
      c.items.forEach(name => {
        state.products.push({ id: pid++, name, catId: c.id, qty: '', price: '' });
      });
    });
    state.nextId = pid;
    saveState();
  }

  function ensureNewCategories() {
    const newCats = [
      { id: 'hortifruti', name: 'Hortifruti' },
      { id: 'congelados', name: 'Congelados' },
      { id: 'snacks', name: 'Snacks e petiscos' },
      { id: 'bebidas', name: 'Bebidas' },
      { id: 'cereais', name: 'Cereais e café da manhã' }
    ];
    newCats.forEach(nc => {
      if (!state.categories.find(c => c.id === nc.id)) {
        state.categories.push({ id: nc.id, name: nc.name, collapsed: false });
      }
    });
  }

  function saveState() {
    try {
      localStorage.setItem('feira_state', JSON.stringify(state));
    } catch (e) { /* ignore */ }
  }

  // ─── PRICE MASK HELPERS ─────────────────────────────────────────
  function centavosToDisplay(centavos) {
    if (centavos === '' || centavos === null || centavos === undefined) return '';
    const n = parseInt(centavos, 10);
    if (isNaN(n) || n === 0) return '';
    const reais = Math.floor(n / 100);
    const cents = n % 100;
    return reais + ',' + String(cents).padStart(2, '0');
  }

  function applyPriceMask(rawValue) {
    const digits = rawValue.replace(/\D/g, '');
    if (digits === '' || digits === '0') return { display: '', centavos: '' };
    const n = parseInt(digits, 10);
    if (isNaN(n) || n === 0) return { display: '', centavos: '' };
    const reais = Math.floor(n / 100);
    const cents = n % 100;
    const display = reais + ',' + String(cents).padStart(2, '0');
    return { display, centavos: n };
  }

  // ─── OTHER HELPERS ───────────────────────────────────────────────
  function parseQty(v) {
    if (v === '' || v === null || v === undefined) return 0;
    const s = String(v).replace(',', '.');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  function formatBRL(centavos) {
    const n = centavos / 100;
    return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function genId(prefix) {
    return prefix + '_' + (state.nextId++);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── NORMALIZE (accent-insensitive) ─────────────────────────────
  function normalizeStr(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .trim();
  }

  // ─── RENDER ─────────────────────────────────────────────────────
  const root = document.getElementById('list-root');

  function render() {
    const searchTerm = normalizeStr(document.getElementById('search-input').value || '');

    root.innerHTML = '';

    const sortedCats = [
      ...state.categories.filter(c => c.name !== 'Sem categoria'),
      ...state.categories.filter(c => c.name === 'Sem categoria')
    ];

    sortedCats.forEach((cat, catIndex) => {
      let prods = state.products.filter(p => p.catId === cat.id);

      // Filter by search
      let filteredProds = prods;
      if (searchTerm) {
        const catMatch = normalizeStr(cat.name).includes(searchTerm);
        if (catMatch) {
          filteredProds = prods; // show all products in matched category
        } else {
          filteredProds = prods.filter(p => normalizeStr(p.name).includes(searchTerm));
        }
      }

      if (cat.name === 'Sem categoria' && filteredProds.length === 0) return;
      if (searchTerm && filteredProds.length === 0) return;

      const catColor = getCatColor(catIndex, cat.name);
      const checkedCount = filteredProds.filter(p => p.price !== '' && p.price > 0).length;

      // When searching, auto-expand categories with results
      const isCollapsed = searchTerm ? false : cat.collapsed;

      const section = document.createElement('div');
      section.className = 'category' + (isCollapsed ? ' collapsed' : '');
      section.dataset.catId = cat.id;
      section.style.setProperty('--cat-color', catColor);

      section.innerHTML = `
        <div class="category-header" data-cat-header="${cat.id}" style="background:${catColor}">
          <span class="category-title">${escapeHtml(cat.name)}</span>
          <span class="category-badge">${checkedCount}/${filteredProds.length}</span>
          <span class="category-chevron">&#8964;</span>
        </div>
        <div class="category-body" id="cat-body-${cat.id}"></div>
      `;

      const body = section.querySelector('.category-body');

      filteredProds.forEach(prod => {
        const isChecked = prod.price !== '' && prod.price > 0;
        const itemEl = document.createElement('div');
        itemEl.className = 'item' + (isChecked ? ' checked' : '');
        itemEl.dataset.prodId = prod.id;

        const displayPrice = centavosToDisplay(prod.price);

        itemEl.innerHTML = `
          <div class="item-delete-bg" aria-hidden="true">Deletar</div>
          <div class="item-name">
            <span class="check-icon" style="background:${catColor}">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
            <span class="name-text" title="${escapeHtml(prod.name)}">${escapeHtml(prod.name)}</span>
          </div>
          <div class="input-wrap">
            <span class="input-label">Qtd</span>
            <input
              type="text"
              inputmode="decimal"
              placeholder="0"
              value="${escapeHtml(String(prod.qty))}"
              data-field="qty"
              data-id="${prod.id}"
              autocomplete="off"
            />
          </div>
          <div class="input-wrap">
            <span class="input-label">Preço R$</span>
            <input
              type="text"
              inputmode="numeric"
              placeholder="0,00"
              value="${escapeHtml(displayPrice)}"
              data-field="price"
              data-id="${prod.id}"
              autocomplete="off"
            />
          </div>
        `;

        attachSwipeToDelete(itemEl, prod.id);
        body.appendChild(itemEl);
      });

      root.appendChild(section);
    });

    // empty state
    if (root.children.length === 0) {
      const searchVal = document.getElementById('search-input').value.trim();
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-state';

          <p>Nenhum produto encontrado.</p>
        `;
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-from-search';
        addBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Adicionar "${escapeHtml(searchVal)}"`;

          addProductFromSearch(searchVal);
        });
        emptyDiv.appendChild(addBtn);
      } else {
        emptyDiv.innerHTML = `
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>

    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn-clear-bottom';
    clearBtn.id = 'btn-clear-bottom';
    clearBtn.textContent = 'Limpar todos os valores';
    clearBtn.addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.add('open');
    });
    root.appendChild(clearBtn);

    updateSummary();
  }

  function updateSummary() {
    let totalCentavos = 0;
    let checked = 0;
    const allCount = state.products.length;

    state.products.forEach(p => {
      const price = (p.price !== '' && p.price !== null && p.price !== undefined) ? parseInt(p.price, 10) : 0;
      if (price > 0) {
        const qty = parseQty(p.qty);
        const effectiveQty = qty > 0 ? qty : 1;
        totalCentavos += price * effectiveQty;
        checked++;
      }
    });

    document.getElementById('total').textContent = formatBRL(totalCentavos);
    document.getElementById('counter').textContent = `${checked} de ${allCount} itens pegos`;
  }

  function patchItemUI(prodId) {
    const prod = state.products.find(p => p.id === prodId);
    if (!prod) return;
    const itemEl = root.querySelector(`.item[data-prod-id="${prodId}"]`);
    if (!itemEl) return;
    const isChecked = prod.price !== '' && prod.price > 0;
    if (isChecked) itemEl.classList.add('checked');
    else itemEl.classList.remove('checked');

    const catForBadge = state.categories.find(c => c.id === prod.catId);
    if (catForBadge) {
      const prods = state.products.filter(p => p.catId === catForBadge.id);
      const cc = prods.filter(p => p.price !== '' && p.price > 0).length;
      const badge = root.querySelector(`.category[data-cat-id="${catForBadge.id}"] .category-badge`);
      if (badge) badge.textContent = `${cc}/${prods.length}`;
    }

    updateSummary();
  }

  // ─── SWIPE TO DELETE ─────────────────────────────────────────────
  function attachSwipeToDelete(itemEl, prodId) {
    const bg = itemEl.querySelector('.item-delete-bg');
    let startX = 0, startY = 0, currentX = 0;
    let isDragging = false;
    let isHorizontal = null;

    const THRESHOLD = 0.4; // 40% of width

    function onStart(x, y) {
      startX = x;
      startY = y;
      currentX = 0;
      isDragging = true;
      isHorizontal = null;
      itemEl.style.transition = 'none';
    }

    function onMove(x, y) {
      if (!isDragging) return;
      const dx = x - startX;
      const dy = y - startY;

      if (isHorizontal === null) {
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
          isHorizontal = Math.abs(dx) > Math.abs(dy);
        }
      }

      if (!isHorizontal) return;

      // Only left swipe
      currentX = Math.min(0, dx);
      const absX = Math.abs(currentX);
      const w = itemEl.offsetWidth;

      // Move the item content (all children except bg)
      const children = Array.from(itemEl.children).filter(el => !el.classList.contains('item-delete-bg'));
      children.forEach(ch => {
        ch.style.transform = `translateX(${currentX}px)`;
        ch.style.transition = 'none';
      });

      // Show/hide delete bg
      if (absX > 20) {
        bg.classList.add('visible');
      } else {
        bg.classList.remove('visible');
      }
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      if (!isHorizontal) return;

      const w = itemEl.offsetWidth;
      const absX = Math.abs(currentX);
      const children = Array.from(itemEl.children).filter(el => !el.classList.contains('item-delete-bg'));

      if (absX / w >= THRESHOLD) {
        // Delete
        children.forEach(ch => {
          ch.style.transition = 'transform .2s ease';
          ch.style.transform = `translateX(-${w}px)`;
        });
        itemEl.style.transition = 'max-height .3s ease, opacity .3s ease, padding .3s ease, margin .3s ease';

        setTimeout(() => {
          deleteProduct(prodId, itemEl);
        }, 200);
      } else {
        // Snap back
        children.forEach(ch => {
          ch.style.transition = 'transform .2s ease';
          ch.style.transform = 'translateX(0)';
        });
        bg.classList.remove('visible');
      }
    }

    // Touch events
    itemEl.addEventListener('touchstart', e => {
      const t = e.touches[0];
      onStart(t.clientX, t.clientY);
    }, { passive: true });

    itemEl.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (isHorizontal) e.preventDefault();
      onMove(t.clientX, t.clientY);
    }, { passive: false });

    itemEl.addEventListener('touchend', () => onEnd());
    itemEl.addEventListener('touchcancel', () => {
      isDragging = false;
      const children = Array.from(itemEl.children).filter(el => !el.classList.contains('item-delete-bg'));
      children.forEach(ch => {
        ch.style.transition = 'transform .2s ease';
        ch.style.transform = 'translateX(0)';
      });
      bg.classList.remove('visible');
    });

    // Mouse events (desktop)
    itemEl.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      onStart(e.clientX, e.clientY);

      const onMouseMove = ev => onMove(ev.clientX, ev.clientY);
      const onMouseUp = () => {
        onEnd();
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      };
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    });
  }

  // ─── DELETE PRODUCT ──────────────────────────────────────────────
  function deleteProduct(prodId, itemEl) {
    state.products = state.products.filter(p => p.id !== prodId);
    saveState();

    if (itemEl && itemEl.parentNode) {
      itemEl.style.maxHeight = itemEl.offsetHeight + 'px';
      itemEl.style.overflow = 'hidden';
      requestAnimationFrame(() => {
        itemEl.style.transition = 'max-height .25s ease, opacity .25s ease';
        itemEl.style.maxHeight = '0';
        itemEl.style.opacity = '0';
        setTimeout(() => {
          if (itemEl.parentNode) itemEl.parentNode.removeChild(itemEl);
          updateSummary();
          updateBadgesAfterDelete();
        }, 260);
      });
    } else {
      render();
    }
  }

  function updateBadgesAfterDelete() {
    state.categories.forEach(cat => {
      const prods = state.products.filter(p => p.catId === cat.id);
      const cc = prods.filter(p => p.price !== '' && p.price > 0).length;
      const badge = root.querySelector(`.category[data-cat-id="${cat.id}"] .category-badge`);
      if (badge) badge.textContent = `${cc}/${prods.length}`;
    });
  }

  // ─── CATEGORY MATCHING ───────────────────────────────────────────
  function guessCategory(productName) {
    const norm = normalizeStr(productName);
    // Exact match first
    for (const [key, cat] of Object.entries(PRODUCT_DICT)) {
      if (normalizeStr(key) === norm) return cat;
    }
    // Partial match
    for (const [key, cat] of Object.entries(PRODUCT_DICT)) {
      const normKey = normalizeStr(key);
      if (norm.includes(normKey) || normKey.includes(norm)) return cat;
    }
    return 'Sem categoria';
  }

  // ─── ENSURE "SEM CATEGORIA" EXISTS ──────────────────────────────
  function ensureSemCategoria() {
    const exists = state.categories.find(c => c.name === 'Sem categoria');
    if (!exists) {
      state.categories.push({ id: 'sem_categoria', name: 'Sem categoria', collapsed: false });
    }
  }

  // ─── ADD PRODUCT VIA BOTTOM BAR ─────────────────────────────────
  function addProductFromSearch(productName) {
    const trimmed = productName.trim();
    if (!trimmed) return;

    const categoryName = guessCategory(trimmed);

    if (categoryName === 'Sem categoria') {
      ensureSemCategoria();
    }

    let cat = state.categories.find(c => c.name === categoryName);
    if (!cat) {
      ensureSemCategoria();
      cat = state.categories.find(c => c.name === 'Sem categoria');
    }

    // Expand if collapsed
    if (cat.collapsed) {
      cat.collapsed = false;
    }

    const prod = { id: state.nextId++, name: trimmed, catId: cat.id, qty: '', price: '' };
    state.products.push(prod);
    saveState();

    // Limpa a busca para mostrar o produto na lista
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');

    render();

    // Scroll to new item
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const el = root.querySelector(`.item[data-prod-id="${prod.id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });
  }

  // ─── EVENT DELEGATION ────────────────────────────────────────────
  root.addEventListener('click', e => {
    const header = e.target.closest('[data-cat-header]');
    if (header) {
      const catId = header.dataset.catHeader;
      const cat = state.categories.find(c => c.id === catId);
      if (cat) {
        cat.collapsed = !cat.collapsed;
        const section = root.querySelector(`.category[data-cat-id="${catId}"]`);
        if (section) section.classList.toggle('collapsed', cat.collapsed);
        saveState();
      }
    }
  });

  root.addEventListener('input', e => {
    const inp = e.target.closest('input[data-field]');
    if (!inp) return;

    const id = parseInt(inp.dataset.id, 10);
    const field = inp.dataset.field;
    const prod = state.products.find(p => p.id === id);
    if (!prod) return;

    if (field === 'price') {
      const { display, centavos } = applyPriceMask(inp.value);
      if (inp.value !== display) inp.value = display;
      prod.price = centavos;
    } else {
      prod[field] = inp.value;
    }

    saveState();
    patchItemUI(id);
  });

  // ─── SEARCH ──────────────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');

  searchInput.addEventListener('input', () => {
    const val = searchInput.value;
    searchClear.classList.toggle('visible', !!val);
    render();
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = searchInput.value.trim();
      if (!val) return;
      // Se não há resultados visíveis, adiciona o produto
      const hasResults = root.querySelector('.item');
      if (!hasResults) {
        addProductFromSearch(val);
        searchInput.value = '';
        searchClear.classList.remove('visible');
        render();
      }
    }
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    render();
    searchInput.focus();
  });

  // ─── CLEAR VALUES ────────────────────────────────────────────────
  const confirmOverlay = document.getElementById('confirm-overlay');

  confirmOverlay.addEventListener('click', e => {
    if (e.target === confirmOverlay) confirmOverlay.classList.remove('open');
  });

  document.getElementById('btn-cancel-clear').addEventListener('click', () => {
    confirmOverlay.classList.remove('open');
  });

  document.getElementById('btn-confirm-clear').addEventListener('click', () => {
    confirmOverlay.classList.remove('open');
    state.products.forEach(p => { p.qty = ''; p.price = ''; });
    saveState();
    render();
  });

  // ─── DELETE CONFIRM MODAL ────────────────────────────────────────
  const deleteOverlay = document.getElementById('delete-confirm-overlay');
  let pendingDeleteId = null;

  deleteOverlay.addEventListener('click', e => {
    if (e.target === deleteOverlay) {
      deleteOverlay.classList.remove('open');
      pendingDeleteId = null;
    }
  });

  document.getElementById('btn-cancel-delete').addEventListener('click', () => {
    deleteOverlay.classList.remove('open');
    pendingDeleteId = null;
  });

  document.getElementById('btn-confirm-delete').addEventListener('click', () => {
    deleteOverlay.classList.remove('open');
    if (pendingDeleteId !== null) {
      state.products = state.products.filter(p => p.id !== pendingDeleteId);
      saveState();
      render();
      pendingDeleteId = null;
    }
  });

  // ─── INIT ────────────────────────────────────────────────────────
  loadState();
  render();

})();
